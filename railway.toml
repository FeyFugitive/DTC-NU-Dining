# Monorepo: Go API lives in /backend (Dockerfile is not at repo root).
# See https://docs.railway.com/deployments/monorepo

[build]
builder = "dockerfile"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
